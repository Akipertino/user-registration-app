services:

  mongo:
    image: mongo:8
    container_name: mongo-userapp
    # restart: unless-stopped
    ports:
      - "27018:27017"
    
    volumes:
      - mongodb_data:/data/db

  backend:
    build: ./backend
    # restart: unless-stopped
    container_name: backend-userapp
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/userdb
      - PORT=5000
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    # restart: unless-stopped
    container_name: frontend-userapp
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongodb_data: